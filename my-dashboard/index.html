<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-grid-1x2-fill"></i>
      <span>My Dashboard</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-link active">
        <i class="bi bi-speedometer2"></i>
        <span>Overview</span>
      </a>
      <a href="#" class="nav-link">
        <i class="bi bi-folder2-open"></i>
        <span>Projects</span>
      </a>
      <a href="#" class="nav-link">
        <i class="bi bi-people"></i>
        <span>Team</span>
      </a>
      <a href="#" class="nav-link">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </a>
    </nav>
  </aside>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- Main area -->
  <div class="main-wrapper">

    <!-- Navbar -->
    <header class="navbar-top">
      <button id="sidebarToggle" class="btn-icon" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>

      <div class="navbar-actions">
        <button class="btn-icon" aria-label="Notifications">
          <i class="bi bi-bell"></i>
        </button>
        <div class="user-chip">
          <img src="https://ui-avatars.com/api/?name=Alex+Rivera&background=4f46e5&color=fff" alt="Alex Rivera">
          <span>Alex Rivera</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="page-content">
      <div class="page-header">
        <h1>Welcome back</h1>
        <p>Here's a quick snapshot of your workspace.</p>
      </div>

      <section class="cards-grid">
        <article class="card">
          <div class="card-icon bg-indigo">
            <i class="bi bi-kanban"></i>
          </div>
          <div class="card-body">
            <p class="card-label">Active Projects</p>
            <h2 class="card-value">12</h2>
            <span class="card-meta text-success">+2 this week</span>
          </div>
        </article>

        <article class="card">
          <div class="card-icon bg-green">
            <i class="bi bi-check2-circle"></i>
          </div>
          <div class="card-body">
            <p class="card-label">Tasks Completed</p>
            <h2 class="card-value">148</h2>
            <span class="card-meta text-success">+18 this month</span>
          </div>
        </article>

        <article class="card">
          <div class="card-icon bg-amber">
            <i class="bi bi-clock-history"></i>
          </div>
          <div class="card-body">
            <p class="card-label">Hours Logged</p>
            <h2 class="card-value">36.5</h2>
            <span class="card-meta">This week</span>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
